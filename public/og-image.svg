<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Clock icon -->
  <circle cx="600" cy="240" r="80" fill="none" stroke="#6366f1" stroke-width="5" opacity="0.8"/>
  <circle cx="600" cy="240" r="4" fill="#6366f1"/>
  <line x1="600" y1="240" x2="600" y2="185" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <line x1="600" y1="240" x2="640" y2="240" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" font-family="system-ui, sans-serif" font-size="64" font-weight="700" fill="white" letter-spacing="0.05em">Interval</text>

  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="white" opacity="0.6">Clock &middot; Alarm &middot; Timer &middot; Stopwatch</text>

  <!-- Tag -->
  <rect x="430" y="460" width="340" height="36" rx="18" fill="#6366f1" opacity="0.2"/>
  <text x="600" y="484" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" fill="#a5b4fc" font-weight="500">Free &middot; Ad-Free &middot; Offline &middot; Open Source</text>
</svg>
