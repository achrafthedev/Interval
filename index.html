    <!-- JSON-LD Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Will my online alarm work if my computer goes to sleep?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Interval uses the Web Notifications API and Web Audio API to trigger alarms. If your computer is asleep or the tab is fully suspended by the OS, the alarm audio may not play. For best results, keep your device awake — Interval includes a built-in Screen Wake Lock feature that prevents your screen from sleeping while alarms are active."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use Interval completely offline?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Interval is a Progressive Web App (PWA) with a service worker that caches all assets. Once you visit the app, the clock, alarms, timers, and stopwatch all work without any internet connection. You can also install it to your home screen or desktop for a native app experience."
          }
        },
        {
          "@type": "Question",
          "name": "Is Interval really free with no ads?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Interval is 100% free and open-source with zero ads, zero tracking, and zero sign-up required. The full source code is available on GitHub."
          }
        },
        {
          "@type": "Question",
          "name": "How accurate is the online stopwatch?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Interval's stopwatch uses requestAnimationFrame and performance.now() for sub-millisecond precision. It tracks both lap times and cumulative split times, with automatic fastest/slowest lap highlighting and CSV export."
          }
        },
        {
          "@type": "Question",
          "name": "Can I set multiple alarms and timers at the same time?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. You can create unlimited alarms with individual schedules, labels, and sound choices. The timer module supports multiple simultaneous countdown timers, and you can chain them into sequences for interval training like Pomodoro sessions."
          }
        },
        {
          "@type": "Question",
          "name": "What is the Pomodoro timer and how do I use it?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The Pomodoro Technique uses 25-minute work intervals followed by 5-minute breaks. In Interval, tap the 'Pomodoro' preset to instantly start a 25-minute timer, or use the Sequence Builder to create a full session with automatic work-rest-repeat cycles."
          }
        },
        {
          "@type": "Question",
          "name": "How do I compare times across different cities?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Add any city from 400+ worldwide timezones using the 'Add City' button. Interval shows live time, UTC offset, and the exact time difference between all your selected zones. Use the Meeting Planner slider to scrub forward or backward in time to coordinate across timezones."
          }
        }
      ]
    }
    </script>

      </div>
    </noscript>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const base = document.querySelector('base')?.href || '';
          navigator.serviceWorker.register(new URL('sw.js', base || location.href));
        });
      }
